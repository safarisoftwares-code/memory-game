<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⭐ COSMIC DEFENDER | Space Shooter</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', monospace;
            padding: 20px;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            color: white;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(0,242,255,0.4);
            width: 100%;
            box-sizing: border-box;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 1rem;
            font-weight: bold;
        }
        .stats span {
            color: #ffd966;
        }
        button {
            background: #1f2a3e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 80px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        .difficulty-group {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 60px;
        }
        .difficulty-btn {
            background: #2a3a4a;
            padding: 4px 14px;
            font-size: 0.8rem;
        }
        .difficulty-btn.active {
            background: #e67e22;
            box-shadow: 0 0 8px #ffaa44;
        }
        .guide-toggle {
            background: #2a1e3c;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .game-wrapper {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            padding: 12px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            cursor: crosshair;
        }
        .guide-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .guide-modal.show {
            visibility: visible;
            opacity: 1;
        }
        .guide-content {
            background: #1a2a3a;
            padding: 30px;
            border-radius: 48px;
            max-width: 400px;
            color: white;
            text-align: center;
            border: 1px solid gold;
        }
        .close-guide {
            margin-top: 20px;
            background: #e67e22;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #88aaff;
            background: rgba(0,0,0,0.5);
            padding: 6px 20px;
            border-radius: 60px;
            display: inline-block;
        }
        @media (max-width: 1000px) {
            .stats { gap: 10px; font-size: 0.7rem; }
            .difficulty-btn { padding: 2px 10px; font-size: 0.7rem; }
            .guide-toggle span { display: none; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="stats">💥 SCORE: <span id="scoreValue">0</span> &nbsp;| 🌊 WAVE: <span id="waveValue">0</span> &nbsp;| ❤️ <span id="healthValue">10</span></div>
        <div class="stats">🏆 HIGH: <span id="highScoreValue">0</span></div>
        <div class="difficulty-group">
            <button class="difficulty-btn" data-diff="easy">🍃 EASY</button>
            <button class="difficulty-btn active" data-diff="normal">⚡ NORMAL</button>
            <button class="difficulty-btn" data-diff="hard">🔥 HARD</button>
        </div>
        <div class="guide-toggle" id="guideToggleBtn">📖 HOW TO PLAY</div>
        <button id="resetBtn">🔄 RESTART</button>
    </div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>
    <div class="footer">
        © COSMIC DEFENDER · 📧 safarisoftwares@gmail.com
    </div>
</div>

<div id="guideModal" class="guide-modal">
    <div class="guide-content">
        <h2>⭐ HOW TO PLAY</h2>
        <p>🖱️ <strong>Move:</strong> Mouse (cursor on canvas)</p>
        <p>🔫 <strong>Shoot:</strong> Click / Spacebar</p>
        <p>💥 <strong>Homing Missile:</strong> Right-click / Shift key</p>
        <p>✨ <strong>Power-ups:</strong> Collect glowing orbs</p>
        <p>👾 <strong>Boss:</strong> Every 5 waves</p>
        <button class="close-guide" id="closeGuideBtn">GOT IT!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 550;

    let difficulty = 'normal';
    let gameRunning = true;
    let score = 0, wave = 1, health = 10;
    let highScore = localStorage.getItem('cosmicHigh') ? parseInt(localStorage.getItem('cosmicHigh')) : 0;
    let enemies = [], bullets = [], powerups = [], particles = [], homingMissiles = [];
    let shootCooldown = 0, rapidFireUntil = 0, doubleScoreUntil = 0, shieldUntil = 0, homingCharges = 3;
    let player = { x: W/2, y: H - 60, radius: 14 };
    let mouseX = W/2, bossActive = false;

    document.getElementById('highScoreValue').innerText = highScore;

    function updateUI() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('waveValue').innerText = wave;
        document.getElementById('healthValue').innerText = Math.max(0, health);
        if(score > highScore) {
            highScore = Math.floor(score);
            localStorage.setItem('cosmicHigh', highScore);
            document.getElementById('highScoreValue').innerText = highScore;
        }
    }

    function getDifficultyMod() {
        if(difficulty === 'easy') return { enemySpeed: 0.6, spawnDelay: 900, playerHealthBonus: 2 };
        if(difficulty === 'hard') return { enemySpeed: 1.5, spawnDelay: 450, playerHealthBonus: -2 };
        return { enemySpeed: 1.0, spawnDelay: 650, playerHealthBonus: 0 };
    }

    class Enemy {
        constructor(x, y, type) {
            this.x = x; this.y = y;
            this.type = type;
            this.radius = type === 'boss' ? 32 : (type === 'elite' ? 16 : 12);
            this.health = type === 'boss' ? 35 : (type === 'elite' ? 6 : 2);
            this.maxHealth = this.health;
            const speedMod = getDifficultyMod().enemySpeed;
            this.speedY = (type === 'boss' ? 1.0 : (type === 'elite' ? 1.8 : 2.2)) * speedMod;
            this.points = type === 'boss' ? 200 : (type === 'elite' ? 50 : 20);
            this.color = type === 'boss' ? '#e76f51' : (type === 'elite' ? '#bc6ff9' : '#f05454');
        }
        update() {
            this.y += this.speedY;
            if(this.type === 'boss') this.x += Math.sin(Date.now() * 0.003) * 1.2;
        }
        shoot() {
            if(gameRunning && Math.random() < 0.02 && this.y < H-100) {
                bullets.push({ x: this.x, y: this.y+5, radius: 5, enemy: true, damage: 1 });
            }
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            if(this.type === 'boss') {
                ctx.ellipse(this.x, this.y, this.radius, this.radius*0.9, 0, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = "bold 22px monospace";
                ctx.shadowBlur = 0;
                ctx.fillText("👾", this.x-18, this.y+10);
            } else if(this.type === 'elite') {
                ctx.rect(this.x-12, this.y-12, 24, 24);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.fillStyle = "#ffcc88";
                ctx.fillRect(this.x-5, this.y-3, 10, 6);
            } else {
                ctx.moveTo(this.x, this.y-this.radius);
                ctx.lineTo(this.x+this.radius*0.9, this.y+this.radius*0.6);
                ctx.lineTo(this.x+this.radius*0.4, this.y+this.radius*0.2);
                ctx.lineTo(this.x, this.y+this.radius*0.8);
                ctx.lineTo(this.x-this.radius*0.4, this.y+this.radius*0.2);
                ctx.lineTo(this.x-this.radius*0.9, this.y+this.radius*0.6);
                ctx.fill();
            }
            ctx.restore();
            if((this.type === 'elite' || this.type === 'boss') && this.health < this.maxHealth) {
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(this.x-this.radius, this.y-this.radius-8, (this.health/this.maxHealth)*this.radius*2, 5);
            }
        }
    }

    class PowerUp {
        constructor(x, y, type) {
            this.x = x; this.y = y;
            this.type = type;
            this.symbol = type === 'rapid' ? '⚡' : (type === 'shield' ? '🛡️' : (type === 'health' ? '❤️' : (type === 'double' ? '⭐' : '🎯')));
        }
        draw() {
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#f9e45b';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.font = "18px monospace";
            ctx.fillText(this.symbol, this.x-8, this.y+7);
        }
    }

    function addExplosion(x, y, color='#ffaa44') {
        for(let i=0;i<12;i++) {
            particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4-2, life: 18, color });
        }
    }

    function startWave() {
        bossActive = false;
        let enemiesToSpawn = Math.min(3 + Math.floor(wave * 0.6), 12);
        for(let i=0;i<enemiesToSpawn;i++) {
            setTimeout(() => {
                if(!gameRunning) return;
                let type = 'normal';
                if(wave >= 3 && Math.random() < 0.2) type = 'elite';
                enemies.push(new Enemy(40 + Math.random() * (W-80), -30, type));
            }, i * getDifficultyMod().spawnDelay);
        }
        if(wave % 5 === 0 && wave > 0) {
            setTimeout(() => {
                if(!gameRunning) return;
                enemies.push(new Enemy(W/2-40, -50, 'boss'));
                bossActive = true;
            }, 1000);
        }
    }

    function shootFromPlayer() {
        if(!gameRunning) return;
        let rapid = Date.now() < rapidFireUntil;
        let bulletCount = rapid ? 2 : 1;
        for(let i=0;i<bulletCount;i++) {
            let offset = bulletCount === 2 ? (i===0 ? -5 : 5) : 0;
            bullets.push({ x: player.x+offset, y: player.y-12, radius: 5, enemy: false, damage: 1 });
        }
    }

    function fireHoming() {
        if(homingCharges <= 0) return;
        let target = null;
        let minDist = Infinity;
        for(let e of enemies) {
            let d = Math.hypot(player.x - e.x, player.y - e.y);
            if(d < minDist) { minDist = d; target = e; }
        }
        if(!target) return;
        homingCharges--;
        homingMissiles.push({ x: player.x, y: player.y-8, target: target, speed: 8, damage: 3 });
    }

    function resetGame() {
        gameRunning = true;
        const bonus = getDifficultyMod().playerHealthBonus;
        health = 10 + (bonus > 0 ? bonus : (difficulty === 'hard' ? 7 : 0));
        score = 0; wave = 1;
        enemies = []; bullets = []; powerups = []; homingMissiles = []; particles = [];
        rapidFireUntil = 0; doubleScoreUntil = 0; shieldUntil = 0; homingCharges = 3;
        updateUI();
        startWave();
    }

    function updateGame() {
        if(!gameRunning) return;
        player.x = Math.min(W - 20, Math.max(20, mouseX));
        if(shootCooldown > 0) shootCooldown--;

        // Enemy shooting
        for(let e of enemies) {
            if(e.type === 'boss') e.shoot();
            if((e.type === 'elite') && Math.random() < 0.01) e.shoot();
        }

        // Enemy collision
        for(let i=0;i<enemies.length;i++) {
            let e = enemies[i];
            e.update();
            let dist = Math.hypot(player.x - e.x, player.y - e.y);
            if(dist < player.radius + e.radius && !(Date.now() < shieldUntil)) {
                health -= e.type === 'boss' ? 3 : (e.type === 'elite' ? 2 : 1);
                addExplosion(e.x, e.y, '#ff6666');
                enemies.splice(i,1); i--;
                if(health <= 0) { gameRunning = false; }
                updateUI();
                continue;
            }
            // Bullet collision
            for(let j=0;j<bullets.length;j++) {
                let b = bullets[j];
                if(b.enemy) continue;
                if(Math.hypot(b.x - e.x, b.y - e.y) < e.radius+5) {
                    e.health -= b.damage;
                    bullets.splice(j,1); j--;
                    if(e.health <= 0) {
                        let points = (Date.now() < doubleScoreUntil) ? e.points * 2 : e.points;
                        score += points;
                        addExplosion(e.x, e.y, e.color);
                        if(Math.random() < 0.2) {
                            let types = ['rapid','shield','health','double','homingCharge'];
                            powerups.push(new PowerUp(e.x, e.y, types[Math.floor(Math.random()*types.length)]));
                        }
                        enemies.splice(i,1); i--;
                        updateUI();
                        break;
                    }
                }
            }
        }

        // Bullet movement
        for(let i=0;i<bullets.length;i++) {
            bullets[i].enemy ? bullets[i].y += 4 : bullets[i].y -= 7;
            if(bullets[i].y < -30 || bullets[i].y > H+50) bullets.splice(i,1), i--;
        }

        // Homing missiles
        for(let i=0;i<homingMissiles.length;i++) {
            let m = homingMissiles[i];
            if(m.target && m.target.health > 0) {
                let dx = m.target.x - m.x, dy = m.target.y - m.y;
                let len = Math.hypot(dx, dy);
                if(len > 0.01) { m.x += (dx/len) * m.speed; m.y += (dy/len) * m.speed; }
                if(len < 20) {
                    m.target.health -= m.damage;
                    addExplosion(m.x, m.y, '#ffaa44');
                    homingMissiles.splice(i,1); i--;
                    if(m.target.health <= 0) {
                        score += m.target.points;
                        updateUI();
                        enemies = enemies.filter(e => e !== m.target);
                    }
                }
            } else {
                homingMissiles.splice(i,1); i--;
            }
        }

        // Powerups
        for(let i=0;i<powerups.length;i++) {
            let p = powerups[i];
            p.y += 2;
            if(Math.hypot(player.x - p.x, player.y - p.y) < 24) {
                if(p.type === 'rapid') rapidFireUntil = Date.now() + 7000;
                if(p.type === 'shield') shieldUntil = Date.now() + 6000;
                if(p.type === 'health') health = Math.min(10, health+2);
                if(p.type === 'double') doubleScoreUntil = Date.now() + 9000;
                if(p.type === 'homingCharge') homingCharges = Math.min(5, homingCharges+1);
                addExplosion(p.x, p.y, '#88ffaa');
                powerups.splice(i,1);
                updateUI();
            } else if(p.y > H+30) powerups.splice(i,1);
        }

        // Particles
        for(let i=0;i<particles.length;i++) {
            particles[i].x += particles[i].vx;
            particles[i].y += particles[i].vy;
            particles[i].life--;
            if(particles[i].life <= 0) particles.splice(i,1);
        }

        // Wave progression
        if(enemies.length === 0 && gameRunning && !bossActive) {
            wave++;
            updateUI();
            startWave();
        }

        // Auto shooting
        if(shootCooldown === 0 && gameRunning) {
            shootFromPlayer();
            shootCooldown = Date.now() < rapidFireUntil ? 4 : 10;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        // Stars
        for(let i=0;i<150;i++) {
            ctx.fillStyle = `rgba(255,255,200,${0.3+Math.sin(Date.now()*0.002+i)*0.2})`;
            ctx.fillRect((i*131)%W, (i*57)%H, 2, 2);
        }
        // Powerups
        for(let p of powerups) p.draw();
        // Enemies
        for(let e of enemies) e.draw();
        // Bullets
        for(let b of bullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
            ctx.fillStyle = b.enemy ? '#ff8866' : '#88ffcc';
            ctx.shadowBlur = 6;
            ctx.fill();
        }
        // Homing missiles
        for(let m of homingMissiles) {
            ctx.fillStyle = '#ff66aa';
            ctx.beginPath();
            ctx.moveTo(m.x, m.y);
            ctx.lineTo(m.x-5, m.y+12);
            ctx.lineTo(m.x+5, m.y+12);
            ctx.fill();
        }
        // Player ship
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#0af';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y-16);
        ctx.lineTo(player.x+14, player.y+5);
        ctx.lineTo(player.x+7, player.y+2);
        ctx.lineTo(player.x+7, player.y+10);
        ctx.lineTo(player.x, player.y+5);
        ctx.lineTo(player.x-7, player.y+10);
        ctx.lineTo(player.x-7, player.y+2);
        ctx.lineTo(player.x-14, player.y+5);
        ctx.fillStyle = '#6ee7ff';
        ctx.fill();
        ctx.fillStyle = '#ffbb66';
        ctx.beginPath();
        ctx.ellipse(player.x, player.y-5, 5, 6, 0, 0, Math.PI*2);
        ctx.fill();
        // Shield
        if(Date.now() < shieldUntil) {
            ctx.beginPath();
            ctx.arc(player.x, player.y, 24, 0, Math.PI*2);
            ctx.strokeStyle = '#44ddff';
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }
        // Particles
        for(let p of particles) {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 3, 3);
        }
        // Game over
        if(!gameRunning) {
            ctx.font = "bold 38px monospace";
            ctx.fillStyle = '#ff3366';
            ctx.shadowBlur = 0;
            ctx.fillText("💀 GAME OVER 💀", W/2-150, H/2-40);
            ctx.font = "18px monospace";
            ctx.fillStyle = '#ccddff';
            ctx.fillText("Click RESTART", W/2-60, H/2+30);
        }
        // Status text
        if(Date.now() < rapidFireUntil) {
            ctx.fillStyle = '#ffaa44';
            ctx.font = "bold 12px monospace";
            ctx.fillText("⚡ RAPID FIRE ⚡", 15, 35);
        }
        if(homingCharges > 0) {
            ctx.fillStyle = '#ffaa88';
            ctx.font = "bold 12px monospace";
            ctx.fillText(`🎯 MISSILES: ${homingCharges}`, W-110, 35);
        }
    }

    function loop() {
        if(gameRunning) updateGame();
        draw();
        requestAnimationFrame(loop);
    }

    // Mouse tracking - FIXED: cursor now follows properly
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let newX = (e.clientX - rect.left) * scaleX;
        let newY = (e.clientY - rect.top) * scaleY;
        mouseX = Math.min(W - 15, Math.max(15, newX));
    });

    canvas.addEventListener('click', () => {
        if(gameRunning && shootCooldown <= 0) {
            shootFromPlayer();
            shootCooldown = 8;
        }
    });

    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        if(gameRunning) fireHoming();
    });

    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space') {
            e.preventDefault();
            if(gameRunning && shootCooldown <= 0) {
                shootFromPlayer();
                shootCooldown = 8;
            }
        }
        if(e.code === 'ShiftLeft') {
            e.preventDefault();
            if(gameRunning) fireHoming();
        }
    });

    document.getElementById('resetBtn').addEventListener('click', resetGame);

    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            difficulty = btn.dataset.diff;
            resetGame();
        });
    });

    document.getElementById('guideToggleBtn').addEventListener('click', () => {
        document.getElementById('guideModal').classList.add('show');
    });
    document.getElementById('closeGuideBtn').addEventListener('click', () => {
        document.getElementById('guideModal').classList.remove('show');
    });

    resetGame();
    loop();
</script>
</body>
</html>
