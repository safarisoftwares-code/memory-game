<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⭐ COSMIC DEFENDER | Space Shooter</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', monospace;
            padding: 20px;
        }
        .game-wrapper {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            padding: 12px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            cursor: none;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            color: #eef5ff;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid rgba(0,242,255,0.4);
        }
        .stats {
            display: flex;
            gap: 24px;
            font-size: 1rem;
            font-weight: bold;
        }
        .stats span {
            color: #ffd966;
        }
        button {
            background: #1f2a3e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 80px;
            cursor: pointer;
            font-family: monospace;
        }
        .controls-hint {
            font-size: 0.7rem;
            background: #00000066;
            padding: 4px 12px;
            border-radius: 20px;
        }
        @media (max-width: 880px) {
            .stats { gap: 12px; font-size: 0.75rem; }
            .controls-hint { display: none; }
        }
    </style>
</head>
<body>
<div>
    <div class="info-panel">
        <div class="stats">💥 SCORE: <span id="scoreValue">0</span> &nbsp;| 🌊 WAVE: <span id="waveValue">0</span> &nbsp;| ❤️ <span id="healthValue">10</span> &nbsp;| 🎯 KILLS: <span id="killValue">0</span></div>
        <div class="stats">🏆 HIGH SCORE: <span id="highScoreValue">0</span></div>
        <button id="resetGameBtn">🔄 RESTART</button>
        <div class="controls-hint">🖱️ mouse move | click / SPACE shoot | RCLICK / SHIFT → homing missile</div>
    </div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="1000" height="650"></canvas>
    </div>
    <div style="text-align: center; margin-top: 16px; font-size: 12px; color: #88aaff; background: #00000066; display: inline-block; width: auto; padding: 6px 20px; border-radius: 60px;">
        © COSMIC DEFENDER · ORIGINAL GAME · 📧 safarisoftwares@gmail.com
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1000, H = 650;

        let gameRunning = true;
        let score = 0;
        let wave = 1;
        let health = 10;
        let kills = 0;
        let highScore = localStorage.getItem('cosmicHigh') ? parseInt(localStorage.getItem('cosmicHigh')) : 0;
        let enemies = [];
        let bullets = [];
        let powerups = [];
        let particles = [];
        let homingMissiles = [];
        
        let shootCooldown = 0;
        let rapidFireEnd = 0;
        let doubleScoreEnd = 0;
        let shieldEnd = 0;
        let homingCharges = 3;
        
        let player = { x: W/2, y: H - 70, radius: 14 };
        let mouseX = W/2;
        let bossActive = false;
        
        let screenShake = 0;
        
        const scoreSpan = document.getElementById('scoreValue');
        const waveSpan = document.getElementById('waveValue');
        const healthSpan = document.getElementById('healthValue');
        const killsSpan = document.getElementById('killValue');
        const highScoreSpan = document.getElementById('highScoreValue');
        highScoreSpan.innerText = highScore;
        
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            waveSpan.innerText = wave;
            healthSpan.innerText = Math.max(0, health);
            killsSpan.innerText = kills;
            if(score > highScore) { highScore = Math.floor(score); localStorage.setItem('cosmicHigh', highScore); highScoreSpan.innerText = highScore; }
        }
        
        class Enemy {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.type = type;
                this.radius = (type === 'boss') ? 34 : (type === 'bomber' ? 18 : (type === 'elite' ? 16 : 12));
                this.health = (type === 'boss') ? 35 : (type === 'elite' ? 8 : (type === 'bomber' ? 4 : 2));
                this.maxHealth = this.health;
                this.speedY = (type === 'scout') ? 2.8 : (type === 'fighter' ? 1.8 : (type === 'swarmer' ? 2.2 : (type === 'bomber' ? 1.2 : 1.5)));
                this.shootCooldown = 0;
                this.points = (type === 'scout') ? 10 : (type === 'fighter' ? 20 : (type === 'bomber' ? 50 : (type === 'swarmer' ? 15 : (type === 'elite' ? 100 : 500))));
                this.color = (type === 'scout') ? '#f05454' : (type === 'fighter' ? '#f4a261' : (type === 'bomber' ? '#b5838d' : (type === 'swarmer' ? '#6c91b2' : (type === 'elite' ? '#bc6ff9' : '#e76f51'))));
            }
            update() {
                this.y += this.speedY;
                if(this.type === 'fighter') this.x += Math.sin(Date.now() * 0.008) * 1.2;
                if(this.type === 'swarmer') {
                    let dx = player.x - this.x, dy = player.y - this.y;
                    let len = Math.hypot(dx,dy);
                    if(len > 0.01) { this.x += (dx/len)*1.6; this.y += (dy/len)*0.8; }
                }
                if(this.type === 'boss') {
                    this.x += Math.sin(Date.now() * 0.003) * 1.5;
                    if(Math.random() < 0.02 && this.y < H-80 && gameRunning) this.shoot();
                }
                if(this.shootCooldown > 0) this.shootCooldown--;
                if((this.type === 'bomber' || this.type === 'fighter') && Math.random() < 0.012 && this.y < H-100 && !bossActive && gameRunning) this.shoot();
            }
            shoot() {
                if(this.shootCooldown <= 0 && gameRunning) {
                    bullets.push({ x: this.x, y: this.y+5, radius: 5, enemy: true, damage: 1 });
                    this.shootCooldown = 40;
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                if(this.type === 'boss') {
                    ctx.ellipse(this.x, this.y, this.radius, this.radius*0.9, 0, 0, Math.PI*2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = "bold 22px monospace";
                    ctx.shadowBlur = 0;
                    ctx.fillText("👾", this.x-18, this.y+10);
                } else if(this.type === 'elite') {
                    ctx.rect(this.x-12, this.y-12, 24, 24);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.fillStyle = "#ffcc88";
                    ctx.fillRect(this.x-5, this.y-3, 10, 6);
                } else {
                    ctx.moveTo(this.x, this.y-this.radius);
                    ctx.lineTo(this.x+this.radius*0.9, this.y+this.radius*0.6);
                    ctx.lineTo(this.x+this.radius*0.4, this.y+this.radius*0.2);
                    ctx.lineTo(this.x, this.y+this.radius*0.8);
                    ctx.lineTo(this.x-this.radius*0.4, this.y+this.radius*0.2);
                    ctx.lineTo(this.x-this.radius*0.9, this.y+this.radius*0.6);
                    ctx.fill();
                }
                ctx.restore();
                if((this.type === 'elite' || this.type === 'boss') && this.health < this.maxHealth) {
                    ctx.fillStyle = '#ff3366';
                    ctx.fillRect(this.x-this.radius, this.y-this.radius-8, (this.health/this.maxHealth)*this.radius*2, 5);
                }
            }
        }
        
        class PowerUp {
            constructor(x,y, type) {
                this.x = x; this.y = y;
                this.type = type;
                this.color = type === 'rapid' ? '#42f5e9' : (type === 'shield' ? '#5dade2' : (type === 'health' ? '#f5426c' : (type === 'double' ? '#f9e45b' : '#c084fc')));
                this.symbol = type === 'rapid' ? '⚡' : (type === 'shield' ? '🛡️' : (type === 'health' ? '❤️' : (type === 'double' ? '⭐' : '🎯')));
            }
            draw(ctx) {
                ctx.shadowBlur = 10;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = "18px monospace";
                ctx.fillText(this.symbol, this.x-8, this.y+7);
            }
        }
        
        function addExplosion(x,y, color='#ffaa44') {
            for(let i=0;i<12;i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4-2, life: 20, color });
            }
        }
        
        function startWave() {
            bossActive = false;
            let enemiesToSpawn = Math.min(5 + Math.floor(wave * 0.8), 18);
            let count = 0;
            let interval = setInterval(() => {
                if(!gameRunning) { clearInterval(interval); return; }
                if(count >= enemiesToSpawn) { clearInterval(interval); return; }
                let type = 'scout';
                let rand = Math.random();
                if(wave >= 2 && rand < 0.2) type = 'fighter';
                if(wave >= 3 && rand < 0.35) type = 'swarmer';
                if(wave >= 4 && rand < 0.15) type = 'bomber';
                if(wave >= 6 && rand < 0.1) type = 'elite';
                let xPos = 40 + Math.random() * (W-80);
                enemies.push(new Enemy(xPos, -20, type));
                count++;
            }, 700);
            if(wave % 5 === 0 && wave > 0) {
                setTimeout(() => {
                    if(!gameRunning) return;
                    enemies.push(new Enemy(W/2-40, -40, 'boss'));
                    bossActive = true;
                }, 1000);
            }
        }
        
        function shootFromPlayer() {
            if(!gameRunning) return;
            let rapid = (Date.now() < rapidFireEnd);
            let bulletCount = rapid ? 2 : 1;
            for(let i=0;i<bulletCount;i++) {
                let offset = (bulletCount === 2) ? (i===0 ? -6 : 6) : 0;
                bullets.push({ x: player.x+offset, y: player.y-10, radius: 6, enemy: false, damage: 1 });
            }
        }
        
        function fireHoming() {
            if(homingCharges <= 0) return false;
            let target = null;
            let minDist = Infinity;
            for(let e of enemies) {
                let d = Math.hypot(player.x - e.x, player.y - e.y);
                if(d < minDist) { minDist = d; target = e; }
            }
            if(!target) return false;
            homingCharges--;
            homingMissiles.push({ x: player.x, y: player.y-8, target: target, active: true, speed: 7, damage: 3 });
            return true;
        }
        
        function updateGame() {
            if(!gameRunning) return;
            player.x = Math.min(W - 20, Math.max(20, mouseX));
            if(shootCooldown > 0) shootCooldown--;
            
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                e.update();
                let dist = Math.hypot(player.x - e.x, player.y - e.y);
                if(dist < player.radius + e.radius && !(Date.now() < shieldEnd)) {
                    health -= (e.type === 'boss') ? 3 : (e.type === 'elite' ? 2 : 1);
                    addExplosion(e.x, e.y, '#ff6666');
                    enemies.splice(i,1); i--;
                    if(health <= 0) { gameRunning = false; }
                    screenShake = 12;
                    updateUI();
                    continue;
                }
                for(let j=0;j<bullets.length;j++) {
                    let b = bullets[j];
                    if(b.enemy) continue;
                    let bdist = Math.hypot(b.x - e.x, b.y - e.y);
                    if(bdist < e.radius+5) {
                        e.health -= b.damage;
                        bullets.splice(j,1); j--;
                        if(e.health <= 0) {
                            let pointsGain = (Date.now() < doubleScoreEnd) ? e.points * 2 : e.points;
                            score += pointsGain;
                            kills++;
                            addExplosion(e.x, e.y, e.color);
                            if(Math.random() < 0.18) {
                                let types = ['rapid','shield','health','double','homingCharge'];
                                let r = Math.floor(Math.random()*types.length);
                                powerups.push(new PowerUp(e.x, e.y, types[r]));
                            }
                            enemies.splice(i,1); i--;
                            updateUI();
                            break;
                        }
                    }
                }
            }
            
            for(let i=0;i<bullets.length;i++) {
                if(bullets[i].enemy) bullets[i].y += 4.5;
                else bullets[i].y -= 8;
                if(bullets[i].y < -20 || bullets[i].y > H+50) bullets.splice(i,1), i--;
            }
            
            for(let i=0;i<homingMissiles.length;i++) {
                let m = homingMissiles[i];
                if(m.target && m.target.health > 0) {
                    let dx = m.target.x - m.x, dy = m.target.y - m.y;
                    let len = Math.hypot(dx,dy);
                    if(len>0.01) { m.x += (dx/len)*m.speed; m.y += (dy/len)*m.speed; }
                    if(len < 18) {
                        m.target.health -= m.damage;
                        addExplosion(m.x, m.y, '#ffaa44');
                        homingMissiles.splice(i,1); i--;
                        if(m.target.health <= 0) {
                            let pts = (Date.now() < doubleScoreEnd) ? m.target.points*2 : m.target.points;
                            score += pts; kills++; updateUI();
                            enemies = enemies.filter(e => e !== m.target);
                        }
                        continue;
                    }
                } else { homingMissiles.splice(i,1); i--; }
                if(m.y < -50) homingMissiles.splice(i,1);
            }
            
            for(let i=0;i<powerups.length;i++) {
                let p = powerups[i];
                p.y += 2;
                if(Math.hypot(player.x - p.x, player.y - p.y) < 24) {
                    if(p.type === 'rapid') rapidFireEnd = Date.now() + 8000;
                    if(p.type === 'shield') shieldEnd = Date.now() + 7000;
                    if(p.type === 'health') health = Math.min(10, health+3);
                    if(p.type === 'double') doubleScoreEnd = Date.now() + 10000;
                    if(p.type === 'homingCharge') homingCharges = Math.min(5, homingCharges+1);
                    addExplosion(p.x, p.y, '#88ffaa');
                    powerups.splice(i,1);
                    updateUI();
                } else if(p.y > H+30) powerups.splice(i,1);
            }
            
            for(let i=0;i<particles.length;i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if(particles[i].life <=0) particles.splice(i,1);
            }
            if(screenShake>0) screenShake--;
            
            if(enemies.length === 0 && gameRunning && !bossActive) {
                wave++;
                updateUI();
                startWave();
            }
            
            if(shootCooldown === 0 && gameRunning) {
                shootFromPlayer();
                shootCooldown = (Date.now() < rapidFireEnd) ? 3 : 8;
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,W,H);
            for(let i=0;i<200;i++) {
                ctx.fillStyle = `rgba(255,255,200,${0.3+Math.sin(Date.now()*0.002+i)*0.2})`;
                ctx.fillRect( (i*131)%W, (i*57)%H, 2,2);
            }
            for(let p of powerups) p.draw(ctx);
            for(let e of enemies) e.draw(ctx);
            for(let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
                ctx.fillStyle = b.enemy ? '#ff8866' : '#88ffcc';
                ctx.shadowBlur = 8;
                ctx.fill();
            }
            for(let m of homingMissiles) {
                ctx.fillStyle = '#ff66aa';
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x-5, m.y+12);
                ctx.lineTo(m.x+5, m.y+12);
                ctx.fill();
            }
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#0af';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y-18);
            ctx.lineTo(player.x+16, player.y+6);
            ctx.lineTo(player.x+8, player.y+2);
            ctx.lineTo(player.x+8, player.y+12);
            ctx.lineTo(player.x, player.y+6);
            ctx.lineTo(player.x-8, player.y+12);
            ctx.lineTo(player.x-8, player.y+2);
            ctx.lineTo(player.x-16, player.y+6);
            ctx.fillStyle = '#6ee7ff';
            ctx.fill();
            ctx.fillStyle = '#ffbb66';
            ctx.beginPath();
            ctx.ellipse(player.x, player.y-6, 6, 7, 0, 0, Math.PI*2);
            ctx.fill();
            if(Date.now() < shieldEnd) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, 26, 0, Math.PI*2);
                ctx.strokeStyle = '#44ddff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            for(let p of particles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3,3);
            }
            if(!gameRunning){
                ctx.font = "bold 46monospace";
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 0;
                ctx.fillText("💀 GAME OVER 💀", W/2-190, H/2-50);
                ctx.font = "22px monospace";
                ctx.fillStyle = '#ccddff';
                ctx.fillText("click RESTART to defend cosmos again", W/2-190, H/2+40);
            }
            if(Date.now() < rapidFireEnd) {
                ctx.fillStyle = '#ffaa44';
                ctx.font = "bold 14px monospace";
                ctx.fillText("⚡ RAPID FIRE ⚡", 20, 45);
            }
            if(homingCharges>0) ctx.fillText(`🎯 MISSILES: ${homingCharges}`, W-140, 45);
        }
        
        function loop() {
            if(gameRunning) updateGame();
            draw();
            requestAnimationFrame(loop);
        }
        
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let newX = (e.clientX - rect.left) * scaleX;
            mouseX = Math.min(W-15, Math.max(15, newX));
        }
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('click', () => { if(gameRunning && shootCooldown === 0) { shootFromPlayer(); shootCooldown = 6; } });
        canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); if(gameRunning) fireHoming(); });
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') { e.preventDefault(); if(gameRunning && shootCooldown === 0) { shootFromPlayer(); shootCooldown = 6; } }
            if(e.code === 'ShiftLeft') { e.preventDefault(); if(gameRunning) fireHoming(); }
        });
        document.getElementById('resetGameBtn').addEventListener('click', () => {
            gameRunning = true; health = 10; score = 0; kills = 0; wave = 1; enemies = []; bullets = []; powerups = []; homingMissiles = []; particles = [];
            rapidFireEnd = 0; doubleScoreEnd = 0; shieldEnd = 0; homingCharges = 3;
            updateUI(); startWave(); 
        });
        
        highScoreSpan.innerText = highScore;
        startWave();
        loop();
        updateUI();
    })();
</script>
</body>
</html>
